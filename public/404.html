<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable - MapEvent</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:#020617;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
        .container{max-width:480px}
        h1{font-size:72px;font-weight:800;background:linear-gradient(90deg,#00ffc3,#3b82f6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
        p{color:#94a3b8;font-size:16px;margin-bottom:24px;line-height:1.6}
        a{display:inline-block;padding:14px 32px;background:#00ffc3;color:#020617;font-size:16px;font-weight:700;border-radius:12px;text-decoration:none;transition:transform 0.2s,box-shadow 0.2s;margin:6px}
        a:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,255,195,0.3)}
        .secondary{background:transparent;border:1px solid rgba(148,163,184,0.3);color:#94a3b8}
        .secondary:hover{border-color:#00ffc3;color:#00ffc3;box-shadow:0 4px 15px rgba(0,255,195,0.1)}
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Cette page n'existe pas ou a été déplacée.</p>
        <a href="/mapevent.html">Ouvrir la carte</a>
        <a href="/" class="secondary">Accueil</a>
    </div>
</body>
</html>
